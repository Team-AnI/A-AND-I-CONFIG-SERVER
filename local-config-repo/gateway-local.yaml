spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

server:
  port: 8080
  max-http-request-header-size: 16KB

security:
  jwt:
    secret: replace-me-local-gateway-jwt-secret-32b

management:
  server:
    port: 9090
    address: 127.0.0.1

app:
  security:
    internal-event-token: replace-me-local-internal-event-token
