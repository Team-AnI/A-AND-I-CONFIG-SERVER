spring:
  application:
    name: a-and-i-config-server
  profiles:
    default: local
    group:
      local:
        - native
      aws:
        - git
        - awssecretsmanager
  security:
    user:
      name: ${CONFIG_SERVER_USERNAME:config-user}
      password: ${CONFIG_SERVER_PASSWORD:change-this-before-deploy}
  cloud:
    config:
      server:
        accept-empty: false

server:
  port: ${SERVER_PORT:8888}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
